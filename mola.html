<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Mola" />
  <meta name="theme-color" content="#0f172a" />
  <title>Mola Takip</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f172a;
      color: #f1f5f9;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: env(safe-area-inset-top, 32px) 20px env(safe-area-inset-bottom, 20px);
      padding-top: max(env(safe-area-inset-top), 32px);
    }

    h1 {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #475569;
      font-weight: 600;
      margin-bottom: 20px;
    }

    /* Ring */
    .ring-wrap {
      position: relative;
      width: 160px;
      height: 160px;
      margin-bottom: 8px;
    }
    .ring-wrap svg { transform: rotate(-90deg); }
    .ring-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    #timeDisplay {
      font-size: 32px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -1px;
    }
    .ring-label {
      font-size: 11px;
      color: #64748b;
      letter-spacing: 0.1em;
    }

    /* Status bar */
    .status {
      font-size: 12px;
      padding: 7px 16px;
      border-radius: 20px;
      margin-bottom: 20px;
      display: none;
      align-items: center;
      gap: 6px;
    }
    .status.active {
      display: flex;
      background: #052e16;
      border: 1px solid #22c55e;
      color: #86efac;
    }
    .status.over {
      display: flex;
      background: #450a0a;
      border: 1px solid #ef4444;
      color: #fca5a5;
    }
    .dot { animation: blink 1s infinite; }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
    }
    button {
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      padding: 13px 24px;
      transition: opacity 0.15s, transform 0.1s;
    }
    button:active { transform: scale(0.96); }
    #btnStart  { background: #22c55e; color: #fff; }
    #btnStop   { background: #ef4444; color: #fff; display: none; animation: pulse 1.5s infinite; }
    #btnReset  { background: #1e293b; color: #94a3b8; border: 1px solid #334155; padding: 13px 16px; }

    /* Manual input */
    .divider {
      font-size: 11px;
      color: #334155;
      letter-spacing: 0.1em;
      margin-bottom: 14px;
    }
    .input-row {
      display: flex;
      gap: 8px;
      width: 100%;
      max-width: 340px;
      margin-bottom: 6px;
    }
    input[type="text"] {
      flex: 1;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 13px 16px;
      color: #f1f5f9;
      font-size: 15px;
      outline: none;
      -webkit-appearance: none;
    }
    input[type="text"]::placeholder { color: #475569; }
    input[type="text"]:focus { border-color: #3b82f6; }
    #btnAdd { background: #3b82f6; color: #fff; padding: 13px 18px; }
    #errorMsg { font-size: 12px; color: #f87171; min-height: 18px; margin-bottom: 4px; }

    /* Sessions */
    #sessionList {
      width: 100%;
      max-width: 340px;
      margin-top: 20px;
      background: #1e293b;
      border-radius: 14px;
      overflow: hidden;
    }
    .list-header {
      padding: 10px 16px;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #475569;
      border-bottom: 1px solid #0f172a;
    }
    .session-item {
      padding: 11px 16px;
      border-bottom: 1px solid #0f172a;
    }
    .session-item:last-of-type { border-bottom: none; }
    .session-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .session-name { font-size: 13px; color: #94a3b8; }
    .session-dur  { font-size: 16px; font-weight: 700; color: #f1f5f9; }
    .session-time { font-size: 11px; color: #475569; margin-top: 3px; }
    .list-total {
      display: flex;
      justify-content: space-between;
      padding: 11px 16px;
      background: #0f172a;
      font-size: 13px;
      border-top: 1px solid #1e293b;
    }
    .total-label { color: #64748b; }
    #totalDisplay { font-weight: 700; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.7} }
    @keyframes blink  { 0%,100%{opacity:1} 50%{opacity:0.2} }
  </style>
</head>
<body>

<h1>Mola Takip</h1>

<!-- Ring -->
<div class="ring-wrap">
  <svg width="160" height="160" viewBox="0 0 160 160">
    <circle cx="80" cy="80" r="64" fill="none" stroke="#1e293b" stroke-width="12"/>
    <circle id="ringArc" cx="80" cy="80" r="64" fill="none" stroke="#22c55e"
      stroke-width="12" stroke-linecap="round"
      stroke-dasharray="402.1 402.1" stroke-dashoffset="0"
      style="transition: stroke-dasharray .5s, stroke .5s"/>
  </svg>
  <div class="ring-center">
    <span id="timeDisplay">40:00</span>
    <span class="ring-label">kalan</span>
  </div>
</div>

<!-- Status -->
<div id="statusActive" class="status active">
  <span class="dot">●</span>
  <span id="statusText">Mola başladı</span>
</div>
<div id="statusOver" class="status over">
  ⚠️ 40 dakika limitini aştınız!
</div>

<!-- Buttons -->
<div class="btn-row">
  <button id="btnStart" onclick="startLive()">▶ Molayı Başlat</button>
  <button id="btnStop"  onclick="stopLive()">⏹ Molayı Bitir</button>
  <button id="btnReset" onclick="resetAll()">↺</button>
</div>

<div class="divider">— ya da süreyi manuel girin —</div>

<!-- Manual input -->
<div class="input-row">
  <input type="text" id="manualInput" placeholder="Dakika (ör: 10 ya da 5:30)" inputmode="decimal"
    onkeydown="if(event.key==='Enter') addManual()" />
  <button id="btnAdd" onclick="addManual()">Ekle</button>
</div>
<div id="errorMsg"></div>

<!-- Session list -->
<div id="sessionList" style="display:none">
  <div class="list-header">Mola Geçmişi</div>
  <div id="sessionItems"></div>
  <div class="list-total">
    <span class="total-label">Toplam kullanılan</span>
    <span id="totalDisplay">00:00</span>
  </div>
</div>

<script>
  const TOTAL = 40 * 60;
  let remaining = TOTAL;
  let sessions = [];
  let running = false;
  let activeStart = null;
  let ticker = null;

  const circumference = 2 * Math.PI * 64; // 402.1

  function fmt(secs) {
    const neg = secs < 0;
    const abs = Math.abs(secs);
    const m = String(Math.floor(abs / 60)).padStart(2, '0');
    const s = String(abs % 60).padStart(2, '0');
    return (neg ? '-' : '') + m + ':' + s;
  }

  function fmtClock(date) {
    return date.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
  }

  function parseInput(val) {
    const str = val.trim();
    if (!str) return null;
    if (str.includes(':')) {
      const [m, s] = str.split(':').map(Number);
      if (isNaN(m) || isNaN(s)) return null;
      return m * 60 + s;
    }
    if (str.includes('.')) {
      const f = parseFloat(str);
      return isNaN(f) ? null : Math.round(f * 60);
    }
    const n = parseInt(str, 10);
    return isNaN(n) ? null : n * 60;
  }

  function render() {
    const over = remaining < 0;
    const pct = Math.max(0, remaining / TOTAL);
    const dash = pct * circumference;

    // Ring
    document.getElementById('timeDisplay').textContent = fmt(remaining);
    document.getElementById('timeDisplay').style.fontSize = over ? '22px' : '32px';
    document.getElementById('ringArc').setAttribute('stroke-dasharray', `${dash} ${circumference}`);

    // Color
    let color = '#22c55e';
    if (over)             color = '#ef4444';
    else if (remaining < 5*60)  color = '#f97316';
    else if (remaining < 15*60) color = '#eab308';
    document.getElementById('ringArc').setAttribute('stroke', color);
    document.getElementById('totalDisplay').style.color = color;

    // Status banners
    document.getElementById('statusActive').style.display = running ? 'flex' : 'none';
    document.getElementById('statusOver').style.display   = over ? 'flex' : 'none';

    // Buttons
    document.getElementById('btnStart').style.display = running ? 'none' : '';
    document.getElementById('btnStop').style.display  = running ? '' : 'none';
    document.getElementById('btnStart').disabled = remaining <= 0;
    document.getElementById('btnStart').style.opacity = remaining <= 0 ? '0.45' : '1';

    // Total used
    const used = TOTAL - Math.max(0, remaining);
    document.getElementById('totalDisplay').textContent = fmt(used);

    // Session list visibility
    document.getElementById('sessionList').style.display = sessions.length ? '' : 'none';
  }

  function renderSessions() {
    const el = document.getElementById('sessionItems');
    el.innerHTML = sessions.map((s, i) => `
      <div class="session-item">
        <div class="session-top">
          <span class="session-name">#${i+1} — ${s.type}</span>
          <span class="session-dur">${s.label}</span>
        </div>
        <div class="session-time">${fmtClock(s.startedAt)} → ${fmtClock(s.endedAt)}</div>
      </div>
    `).join('');
    render();
  }

  function startLive() {
    if (remaining <= 0) return;
    running = true;
    activeStart = new Date();
    document.getElementById('statusText').textContent = 'Mola başladı — ' + fmtClock(activeStart);
    ticker = setInterval(() => { remaining--; render(); }, 1000);
    render();
  }

  function stopLive() {
    clearInterval(ticker);
    running = false;
    const now = new Date();
    const elapsed = activeStart ? Math.round((now - activeStart) / 1000) : 0;
    if (elapsed > 0) {
      sessions.push({ type: 'canlı', label: fmt(elapsed), secs: elapsed, startedAt: activeStart, endedAt: now });
    }
    activeStart = null;
    renderSessions();
  }

  function addManual() {
    document.getElementById('errorMsg').textContent = '';
    const val = document.getElementById('manualInput').value;
    const secs = parseInput(val);
    if (!secs || secs <= 0) {
      document.getElementById('errorMsg').textContent = 'Geçerli bir süre girin. Örnek: 10, 5:30';
      return;
    }
    if (secs > remaining) {
      document.getElementById('errorMsg').textContent = `Kalan süreyi (${fmt(remaining)}) aşamazsınız!`;
      return;
    }
    const now = new Date();
    const start = new Date(now.getTime() - secs * 1000);
    sessions.push({ type: 'manuel', label: fmt(secs), secs, startedAt: start, endedAt: now });
    remaining -= secs;
    document.getElementById('manualInput').value = '';
    renderSessions();
  }

  function resetAll() {
    clearInterval(ticker);
    running = false; activeStart = null; remaining = TOTAL; sessions = [];
    document.getElementById('manualInput').value = '';
    document.getElementById('errorMsg').textContent = '';
    renderSessions();
  }

  render();
</script>
</body>
</html>
